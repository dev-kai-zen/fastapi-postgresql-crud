services:
  database:
    image: postgres:16
    container_name: postgres-database
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PUBLISH_PORT}:5432"
    volumes:
      - fastapi_pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    container_name: app-redis
    ports:
      - "${REDIS_PUBLISH_PORT}:6379"
    volumes:
      - fastapi_redisdata:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
  api:
    build: .
    container_name: backend-api
    ports:
      - "${API_PUBLISH_PORT}:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      - database
      - redis

volumes:
  fastapi_pgdata:
  fastapi_redisdata:
